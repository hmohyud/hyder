<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Art Portfolio — Masonry</title>
    <meta name="color-scheme" content="dark" />
    <style>
        :root {
            --fg: #e9edf7;
            --muted: #b9c2d7;
            --line: #1b2433;
            /* Use High School Art Portfolio color */
            --accent: #ff9ae0;
            --accent-rgb: 255, 154, 224;

            --gap: 8px;
            --col-width: 280px;
            --col-width-sm: 210px;
            --wrap-max: 1320px;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font: 14px/1.65 ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--fg);
            background:
                radial-gradient(1200px 900px at 80% -10%, #1a2440 0%, transparent 60%),
                radial-gradient(1000px 780px at -10% 110%, #2a1331 0%, transparent 60%),
                linear-gradient(180deg, #070a0f, #0b0f14 45%, #0a0f14 100%);
            background-attachment: fixed, fixed, fixed;
            background-repeat: no-repeat;
            background-size: cover, cover, cover;
            overflow-x: hidden;
        }

        .wrap {
            max-width: var(--wrap-max);
            margin: 0 auto;
            padding: 24px 18px 56px
        }

        header {
            position: sticky;
            top: 0;
            z-index: 5;
            margin: -24px -18px 18px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            backdrop-filter: saturate(1.05) blur(6px);
            background: linear-gradient(180deg, rgba(10, 14, 20, .85), rgba(10, 14, 20, .35));
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 0;
            font-size: 1.45rem;
            letter-spacing: .35px;
            color: var(--accent)
        }

        /* Back button styled like your project links */
        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: .2px;
            border: 1px solid var(--accent);
            color: var(--accent);
            background: transparent;
            transition: background-color .2s ease, border-color .2s ease, color .2s ease;
        }

        .back:hover {
            background-color: rgba(var(--accent-rgb), .13);
        }

        .back:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .25);
        }

        .back::before {
            content: "";
            width: 8px;
            height: 8px;
            margin-right: 2px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
        }

        .muted {
            color: var(--muted)
        }

        /* Filter chips */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0 16px
        }

        .chip {
            border: 1px solid var(--line);
            padding: 6px 10px;
            cursor: pointer;
            user-select: none;
            border-radius: 999px;
            color: var(--fg);
            background: rgba(15, 20, 28, .55);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .sw {
            width: 12px;
            height: 12px
        }

        .chip[aria-pressed="true"] {
            border-color: var(--accent);
            color: var(--accent)
        }

        /* Masonry container */
        .msn {
            column-gap: var(--gap);
            column-width: var(--col-width);
        }

        @media (max-width: 720px) {
            .msn {
                column-width: var(--col-width-sm);
            }
        }

        /* Tiles */
        .card {
            position: relative;
            margin: 0 0 var(--gap) 0;
            break-inside: avoid;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
            box-shadow: 0 8px 24px rgba(0, 0, 0, .35), 0 0 0 1px rgba(255, 255, 255, .02) inset;
            overflow: hidden;
            border-radius: 0;
            cursor: zoom-in;
        }

        .card:hover {
            border-color: rgba(159, 180, 255, .45);
            box-shadow: 0 16px 40px rgba(0, 0, 0, .55), 0 0 0 1px rgba(159, 180, 255, .18) inset
        }

        /* Progressive image: blurred LQIP underneath, sharp thumb fades in on top.
           The wrapper reserves exact aspect-ratio space so nothing reflows. */
        .thumbwrap {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 3 / 4;
            /* overridden inline per-card */
            background: #0d0d0d;
            overflow: hidden;
        }

        .thumbwrap img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumbwrap .lqip {
            filter: blur(14px) saturate(1.06);
            transform: scale(1.12);
        }

        .thumbwrap .full {
            opacity: 0;
            filter: saturate(1.02) contrast(1.03);
            transition: opacity .55s ease;
        }

        .thumbwrap .full.loaded {
            opacity: 1;
        }

        @media (prefers-reduced-motion: reduce) {

            .thumbwrap .full,
            .hero {
                transition: none;
            }
        }

        /* Fallback for browsers without CSS aspect-ratio (e.g. Safari < 15):
           renderGrid sets an explicit padding-bottom per card so tiles still
           reserve height instead of collapsing to zero. */
        @supports not (aspect-ratio: 1 / 1) {
            .thumbwrap {
                height: 0;
                padding-bottom: 133.33%;
            }
        }

        .badge {
            position: absolute;
            top: 6px;
            left: 6px;
            padding: 3px 6px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(0, 0, 0, .55);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 0;
            color: #e6eefb;
            letter-spacing: .2px;
            text-transform: capitalize;
            pointer-events: none;
        }

        /* Lightbox */
        .lb {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            background: rgba(0, 0, 0, .88)
        }

        .lb.open {
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 14px
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px
        }

        .btn {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
            color: var(--muted);
            padding: 8px 12px;
            cursor: pointer
        }

        .stage {
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden
        }

        .hero {
            max-width: min(92vw, 1700px);
            max-height: min(84vh, 92vh);
            border: 1px solid var(--line);
            background: #0d0d0d;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
            /* JS reserves the exact fitted box (width/height) from the known
               dimensions, so the thumbnail and full-res share one size — the
               image only sharpens, never resizes. contain guards against any
               residual aspect mismatch. */
            object-fit: contain;
        }

        /* Loading pill over the stage while the full-resolution image downloads
           on top of the already-visible (sharp) thumbnail. Replaces the old blur,
           which hid the low-res instead of showing it. */
        .lb-spin {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 9px;
            padding: 7px 13px 7px 11px;
            border-radius: 999px;
            background: rgba(0, 0, 0, .62);
            border: 1px solid rgba(255, 255, 255, .12);
            color: var(--muted);
            font-size: 12px;
            letter-spacing: .2px;
            pointer-events: none;
            z-index: 3;
        }

        .lb-spin.show {
            display: inline-flex;
        }

        .lb-spin::before {
            content: "";
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .28);
            border-top-color: var(--accent);
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .lb-spin::before {
                animation: none;
            }
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            border: 1px solid rgba(159, 180, 255, .45);
            background: rgba(0, 0, 0, .45);
            color: #9db6ff;
            font-size: 22px;
            cursor: pointer
        }

        .nav.left {
            left: 16px
        }

        .nav.right {
            right: 16px
        }

        .counter {
            text-align: center;
            color: var(--muted)
        }
    </style>
    <link rel="icon" href="/logoV6.png" />
</head>

<body>
    <div class="wrap">
        <header>
            <h1>Art Portfolio</h1>
            <a class="back" href="/projects" onclick="sessionStorage.setItem('skip-loader','1')">Back</a>
        </header>

        <p class="muted">Selection of pieces, studies, and experiments. Click any image to view full size.</p>

        <div id="legend" class="legend" aria-label="Groups filter"></div>
        <div id="status" class="loading muted">Loading…</div>

        <!-- Unified Masonry Grid -->
        <div id="msn" class="msn"></div>
    </div>

    <!-- Lightbox -->
    <div id="lb" class="lb" role="dialog" aria-modal="true" aria-label="Artwork viewer">
        <div class="row">
            <div class="muted" id="title"></div>
            <button class="btn" id="closeBtn" type="button">Close (Esc)</button>
        </div>
        <div class="stage" id="stage">
            <button class="nav left" id="prevBtn" aria-label="Previous">‹</button>
            <img id="hero" class="hero" alt="" />
            <div id="lbSpin" class="lb-spin" role="status" aria-live="polite">Loading full resolution…</div>
            <button class="nav right" id="nextBtn" aria-label="Next">›</button>
        </div>
        <div class="counter" id="counter"></div>
    </div>

    <script>
        (function () {
            const msn = document.getElementById('msn');
            const legend = document.getElementById('legend');
            const status = document.getElementById('status');

            /* Lightbox */
            const lb = document.getElementById('lb');
            const hero = document.getElementById('hero');
            const titleEl = document.getElementById('title');
            const counter = document.getElementById('counter');
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const stage = document.getElementById('stage');
            const lbSpin = document.getElementById('lbSpin');

            function colorFor(str) {
                let h = 0; for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
                return `hsl(${h % 360} 65% 70%)`;
            }
            function resolveSrc(s) {
                if (!s) return s;
                if (/^(data|blob):/i.test(s)) return s;   // inline LQIP / object URLs pass through
                if (/^https?:\/\//i.test(s)) return s;
                if (s.startsWith('/')) return s;
                return '/' + s.replace(/^\.?\//, '');
            }

            // Lazily load each thumbnail only as it nears the viewport — per-image,
            // never all at once. rootMargin preloads a screen ahead for smoothness.
            const io = ('IntersectionObserver' in window)
                ? new IntersectionObserver((entries) => {
                    for (const entry of entries) {
                        if (!entry.isIntersecting) continue;
                        const img = entry.target;
                        io.unobserve(img);
                        if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); }
                    }
                }, { rootMargin: '600px 0px', threshold: 0.01 })
                : null;

            const SUPPORTS_AR = !!(window.CSS && CSS.supports && CSS.supports('aspect-ratio', '1 / 1'));

            let flat = []; let view = []; let idx = 0;

            function openLightbox(i) { idx = i; renderLb(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
            function closeLightbox() { lb.classList.remove('open'); document.body.style.overflow = ''; }

            // Reserve the exact display box from the known dimensions so the
            // thumbnail and the full-resolution image render at the identical
            // size — the image only sharpens, it never resizes.
            function fitHero(it) {
                const w = it.w || 0, h = it.h || 0;
                const maxW = Math.min(window.innerWidth * 0.92, 1700);
                const maxH = window.innerHeight * 0.84;
                // Unknown dimensions or a not-yet-laid-out (0) viewport: fall back to
                // the CSS max-width/max-height + object-fit:contain so the image is
                // never collapsed to 0px.
                if (!w || !h || !maxW || !maxH) { hero.style.width = ''; hero.style.height = ''; return; }
                const scale = Math.min(maxW / w, maxH / h, 1);   // fit viewport; never upscale past native
                hero.style.width = Math.round(w * scale) + 'px';
                hero.style.height = Math.round(h * scale) + 'px';
            }

            function renderLb() {
                const it = view[idx]; if (!it) return;
                titleEl.textContent = (it.group ? `[${it.group}] ` : '') + (it.title || 'Artwork');
                counter.textContent = (idx + 1) + ' / ' + view.length;

                // Lock the box first, then show the cached thumbnail immediately and
                // load the full-resolution original on top — a loading pill signals
                // the upgrade is in flight, and the image sharpens in place.
                fitHero(it);
                const placeholder = it.thumb || it.src;
                hero.alt = it.title || 'artwork';
                if (it.src && it.src !== placeholder) {
                    hero.src = placeholder;
                    lbSpin.classList.add('show');
                    const full = new Image(); full.decoding = 'async';
                    if ('fetchPriority' in full) full.fetchPriority = 'high';  // focused image jumps the queue
                    full.onload = () => { if (view[idx] === it) { hero.src = it.src; lbSpin.classList.remove('show'); } };
                    full.onerror = () => { if (view[idx] === it) lbSpin.classList.remove('show'); };
                    full.src = it.src;
                } else {
                    lbSpin.classList.remove('show');
                    hero.src = it.src;
                }

                // Preheat neighbour thumbnails (cheap) so left/right nav is instant.
                [view[(idx + 1) % view.length], view[(idx - 1 + view.length) % view.length]]
                    .forEach(n => { const s = n && n.thumb; if (!s) return; const im = new Image(); im.decoding = 'async'; im.src = s; });
            }
            // Keep the reserved box correct as the viewport changes while open.
            window.addEventListener('resize', () => { if (lb.classList.contains('open')) { const it = view[idx]; if (it) fitHero(it); } }, { passive: true });
            closeBtn.onclick = closeLightbox;
            prevBtn.onclick = e => { e.stopPropagation(); idx = (idx - 1 + view.length) % view.length; renderLb(); };
            nextBtn.onclick = e => { e.stopPropagation(); idx = (idx + 1) % view.length; renderLb(); };
            lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
            stage.addEventListener('click', e => { if (e.target === stage) closeLightbox(); });
            window.addEventListener('keydown', e => {
                if (!lb.classList.contains('open')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') { idx = (idx - 1 + view.length) % view.length; renderLb(); }
                if (e.key === 'ArrowRight') { idx = (idx + 1) % view.length; renderLb(); }
            });

            function rrInterleave(map) {
                const keys = [...map.keys()];
                const qs = keys.map(k => map.get(k).slice());
                const out = []; let added = true;
                while (added) {
                    added = false;
                    for (const q of qs) { if (q.length) { out.push(q.shift()); added = true; } }
                }
                return out;
            }

            function renderGrid() {
                if (io) io.disconnect();
                msn.innerHTML = '';
                const frag = document.createDocumentFragment();
                view.forEach((it, i) => {
                    const fig = document.createElement('figure'); fig.className = 'card'; fig.tabIndex = 0; fig.dataset.index = String(i);

                    const wrap = document.createElement('div'); wrap.className = 'thumbwrap';
                    if (it.w && it.h) {
                        wrap.style.aspectRatio = it.w + ' / ' + it.h;
                        if (!SUPPORTS_AR) { wrap.style.height = '0'; wrap.style.paddingBottom = (it.h / it.w * 100) + '%'; }
                    }

                    // Blurred low-res placeholder — inline data URI, appears instantly, zero network.
                    if (it.lqip) {
                        const lq = document.createElement('img'); lq.className = 'lqip';
                        lq.src = it.lqip; lq.alt = ''; lq.setAttribute('aria-hidden', 'true');
                        wrap.appendChild(lq);
                    }

                    // Sharp thumbnail — loaded per-image by the IntersectionObserver, fades in on load.
                    const img = document.createElement('img'); img.className = 'full';
                    img.alt = it.title || 'artwork'; img.decoding = 'async';
                    img.dataset.src = it.thumb || it.src;
                    img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
                    // On failure, drop the broken img so the blurred LQIP stays visible
                    // instead of fading in a broken-image icon.
                    img.addEventListener('error', () => img.remove(), { once: true });
                    wrap.appendChild(img);

                    const badge = document.createElement('div'); badge.className = 'badge';
                    badge.textContent = it.group || 'misc';
                    badge.style.color = colorFor(it.group || 'misc');

                    fig.appendChild(wrap); fig.appendChild(badge);
                    fig.addEventListener('click', () => openLightbox(i));
                    fig.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); } });
                    frag.appendChild(fig);

                    if (io) io.observe(img);
                    else { img.src = img.dataset.src; img.removeAttribute('data-src'); }  // no IO: load immediately
                });
                msn.appendChild(frag);
            }

            async function loadManifest() {
                try {
                    const r = await fetch('./manifest.json', { cache: 'no-store' });
                    const d = await r.json();
                    return Array.isArray(d?.groups) ? d.groups : [];
                } catch (e) { console.error('manifest load failed', e); return []; }
            }

            async function init() {
                const groups = await loadManifest();
                if (!groups.length) { status.textContent = 'No artworks yet.'; return; }

                // Dimensions, thumbnail, and blurred placeholder all come from the
                // manifest — no need to download full images just to measure them.
                const meta = [];
                groups.forEach(g => {
                    const name = g.name || '';
                    (g.items || []).forEach(it => {
                        const src = resolveSrc(it.src);
                        const thumb = it.thumb ? resolveSrc(it.thumb) : src;
                        const title = it.title || (it.src ? decodeURIComponent((it.src.split('/').pop() || '').replace(/\.[^.]+$/, '')) : '');
                        meta.push({ group: name, src, thumb, title, w: it.w || 0, h: it.h || 0, lqip: it.lqip || '' });
                    });
                });

                const map = new Map();
                meta.forEach(m => { const k = m.group || 'misc'; if (!map.has(k)) map.set(k, []); map.get(k).push(m); });
                map.forEach(arr => arr.sort((a, b) => (a.title || '').localeCompare(b.title || '')));

                flat = rrInterleave(map);
                view = flat.slice();

                status.style.display = 'none';
                legend.innerHTML = '';
                const chips = [];

                const all = document.createElement('button'); all.className = 'chip'; all.textContent = 'All'; all.setAttribute('aria-pressed', 'true');
                const allSw = document.createElement('span'); allSw.className = 'sw';
                allSw.style.background = 'linear-gradient(90deg,' + [...map.keys()].slice(0, 6).map(k => colorFor(k)).join(',') + ')';
                all.prepend(allSw); legend.appendChild(all);

                map.forEach((_, name) => {
                    const chip = document.createElement('button'); chip.className = 'chip'; chip.textContent = name; chip.setAttribute('aria-pressed', 'false');
                    const sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = colorFor(name); chip.prepend(sw);
                    legend.appendChild(chip); chips.push(chip);
                });

                function setFilter(name) {
                    const isAll = !name;
                    all.setAttribute('aria-pressed', isAll ? 'true' : 'false');
                    chips.forEach(c => c.setAttribute('aria-pressed', c.textContent === name && !isAll ? 'true' : 'false'));
                    view = isAll ? flat.slice() : flat.filter(x => x.group === name);
                    renderGrid();
                }
                all.onclick = () => setFilter(null);
                chips.forEach(c => c.onclick = () => setFilter(c.textContent));

                renderGrid();

                const rootStyle = document.documentElement.style;
                function onResize() {
                    const small = window.matchMedia('(max-width: 720px)').matches;
                    rootStyle.setProperty('--col-width', small ? getComputedStyle(document.documentElement).getPropertyValue('--col-width-sm') : '280px');
                }
                onResize();
                window.addEventListener('resize', onResize, { passive: true });
            }

            init();
        })();
    </script>
</body>

</html>
