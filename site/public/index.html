    <!-- ===== LOADER (inline — paints before any JS bundle) ===== -->
    <style>
      body { margin: 0; background: #0b0d12; }

      #loader {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0d12;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #loader.loader-exit {
        opacity: 0;
      }
      #loader-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .loader-logo {
        position: relative;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      /* Impact bloom: fires when letters "collide" mid-assembly */
      .loader-impact {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(184, 255, 216, 0.35) 0%,
          rgba(158, 216, 255, 0.14) 35%,
          rgba(183, 197, 255, 0.06) 60%,
          transparent 72%
        );
        mix-blend-mode: screen;
        pointer-events: none;
        opacity: 0;
        z-index: 2;
      }
      #loader.go .loader-impact {
        animation: softBloom 0.4s 0.3s ease-out forwards;
      }

      @keyframes softBloom {
        0%   { transform: scale(0.35); opacity: 0; }
        25%  { opacity: 1; }
        100% { transform: scale(2.3);  opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .go .loader-impact { animation: none !important; opacity: 0; }
      }
    </style>
  </head>
  <body style="background:#0b0d12">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash loader — visible instantly, dismissed by React -->
    <div id="loader">
      <canvas id="loader-canvas"></canvas>
      <div class="loader-logo">
        <div class="loader-impact"></div>
      </div>
    </div>
    <script>
      /* Particle-assembly splash loader.
         ~340 dots in the site's 4-color palette stream in from the edges,
         resolve into the H and M silhouettes at ~0.75s, then scatter
         outward on exit while a shockwave ring expands past the viewport. */
      (function(){
        // Skip the splash when returning from the art gallery
        if (sessionStorage.getItem('skip-loader')) {
          sessionStorage.removeItem('skip-loader');
          var el = document.getElementById('loader');
          if (el) el.remove();
          return;
        }

        var loader = document.getElementById('loader');
        var canvas = document.getElementById('loader-canvas');
        if (!loader || !canvas) return;
        var ctx = canvas.getContext && canvas.getContext('2d');
        if (!ctx) return;
        var logoEl = loader.querySelector('.loader-logo');

        /* Palette — dark ends of the four landing-page card accent bars
           (Skills / Projects / About / Resume). Mirrors the on-page UI. */
        var COLORS = ['#ff72a1', '#b48bff', '#7fd3ff', '#78ffa8'];

        /* Color modes — pick one at random per load.
           Each fn receives local coords (x, y) inside the logo bounding box
           (0..w, 0..h) and returns 0..3 for the COLORS array index. */
        var COLOR_MODES = [
          function(x, y, w, h) {              // diagonal NW -> SE stripes
            return Math.min(3, Math.floor(((x / w + y / h) / 2) * 4));
          },
          function(x, y, w, h) {              // diagonal NE -> SW stripes
            return Math.min(3, Math.floor((((w - x) / w + y / h) / 2) * 4));
          },
          function(x, y, w, h) {              // horizontal bands
            return Math.min(3, Math.floor((y / h) * 4));
          },
          function(x, y, w, h) {              // vertical bands
            return Math.min(3, Math.floor((x / w) * 4));
          },
          function(x, y, w, h) {              // radial rings
            var dx = x - w / 2, dy = y - h / 2;
            var r = Math.sqrt(dx * dx + dy * dy);
            var rmax = Math.sqrt((w / 2) * (w / 2) + (h / 2) * (h / 2));
            return Math.min(3, Math.floor((r / rmax) * 4));
          },
          function(x, y, w, h) {              // quadrants
            return (y >= h / 2 ? 2 : 0) + (x >= w / 2 ? 1 : 0);
          },
        ];
        var colorMode = COLOR_MODES[(Math.random() * COLOR_MODES.length) | 0];
        var H_PATH = 'M8,0 L20,0 L20,28 L49,28 L49,0 L61,0 L61,68 L49,68 L49,40 L20,40 L20,68 L8,68 Z';
        var M_PATH = 'M49,0 L63,0 L75,30 L87,0 L101,0 L101,68 L89,68 L89,22 L77,50 L73,50 L61,22 L61,68 L49,68 Z';
        var LOGO_W = 120, LOGO_H = 68;
        // Content bounds — computed dynamically from sampled points after
        // sampling, so any future path edits center themselves correctly.
        var contentMinX = 0, contentMaxX = LOGO_W;
        var contentMinY = 0, contentMaxY = LOGO_H;
        var SCALE_MAX = 3.8;
        var SCALE = SCALE_MAX;        // recomputed on resize so the logo fits any viewport
        var PER_LETTER = 240;
        var ASSEMBLE_DUR = 720;
        var LERP = 0.095;            // per-frame convergence toward target (lower = slower, more visible streaming)

        var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        var dpr = 1, cx = 0, cy = 0, offX = 0, offY = 0;
        function resize() {
          dpr = Math.min(2, window.devicePixelRatio || 1);
          canvas.width  = Math.floor(window.innerWidth  * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          canvas.style.width  = window.innerWidth  + 'px';
          canvas.style.height = window.innerHeight + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cx = window.innerWidth / 2;
          cy = window.innerHeight / 2;
          // Cap SCALE so the logo (LOGO_W * SCALE) fits within the viewport
          // with comfortable side margins. On phones this drops the scale
          // automatically so the logo stays fully visible and centered.
          // Cap SCALE so the rendered content fits within the viewport with
          // comfortable margins on both axes. Content bounds are measured
          // from the sampled points (see below), making this fully dynamic.
          var contentW = Math.max(1, contentMaxX - contentMinX);
          var contentH = Math.max(1, contentMaxY - contentMinY);
          var maxByWidth  = (window.innerWidth  - 40) / contentW;
          var maxByHeight = (window.innerHeight - 80) / contentH;
          SCALE = Math.max(1, Math.min(SCALE_MAX, maxByWidth, maxByHeight));
          var contentCx = (contentMinX + contentMaxX) / 2;
          var contentCy = (contentMinY + contentMaxY) / 2;
          offX = cx - contentCx * SCALE;
          offY = cy - contentCy * SCALE;
          // Reproject existing particle targets onto the new scale/center.
          if (typeof particles !== "undefined" && particles && particles.length) {
            for (var i = 0; i < particles.length; i++) {
              var p = particles[i];
              if (p.lx != null) {
                p.tx = offX + p.lx * SCALE;
                p.ty = offY + p.ly * SCALE;
              }
            }
          }
        }
        resize();
        window.addEventListener('resize', resize);

        /* Sample n random filled points from an SVG path's interior. */
        function samplePath(pathD, n) {
          try {
            var s = 4;  // supersample for denser sampling space
            var w = LOGO_W * s, h = LOGO_H * s;
            var off = document.createElement('canvas');
            off.width = w; off.height = h;
            var octx = off.getContext('2d');
            octx.scale(s, s);
            octx.fillStyle = '#fff';
            octx.fill(new Path2D(pathD));
            var img = octx.getImageData(0, 0, w, h).data;
            var filled = [];
            for (var y = 0; y < h; y++) {
              for (var x = 0; x < w; x++) {
                if (img[(y * w + x) * 4 + 3] > 128) filled.push([x / s, y / s]);
              }
            }
            if (!filled.length) return [];
            var out = [];
            for (var i = 0; i < n; i++) {
              var p = filled[(Math.random() * filled.length) | 0];
              out.push([p[0], p[1]]);   // unscaled local coords (0..LOGO_W, 0..LOGO_H)
            }
            return out;
          } catch (_) { return []; }
        }

        var targetsH = samplePath(H_PATH, PER_LETTER);
        var targetsM = samplePath(M_PATH, PER_LETTER);
        if (!targetsH.length || !targetsM.length) return;

        // Measure the actual content bounding box from the sampled points so
        // the logo centers itself even if the SVG paths change.
        (function() {
          var all = targetsH.concat(targetsM);
          var minX =  Infinity, maxX = -Infinity;
          var minY =  Infinity, maxY = -Infinity;
          for (var i = 0; i < all.length; i++) {
            var p = all[i];
            if (p[0] < minX) minX = p[0];
            if (p[0] > maxX) maxX = p[0];
            if (p[1] < minY) minY = p[1];
            if (p[1] > maxY) maxY = p[1];
          }
          contentMinX = minX; contentMaxX = maxX;
          contentMinY = minY; contentMaxY = maxY;
        })();
        // Re-run resize now that we know the real content bounds.
        resize();

        var maxD = Math.max(window.innerWidth, window.innerHeight) * 0.9;
        var particles = [];
        function pushPs(targets, biasAngle) {
          for (var i = 0; i < targets.length; i++) {
            var lx = targets[i][0];                       // 0..LOGO_W (unscaled)
            var ly = targets[i][1];                       // 0..LOGO_H
            var q = colorMode(lx, ly, LOGO_W, LOGO_H);
            var angle = biasAngle + (Math.random() - 0.5) * Math.PI * 1.2;
            var dist  = maxD * (0.55 + Math.random() * 0.55);
            var sx = cx + Math.cos(angle) * dist;
            var sy = cy + Math.sin(angle) * dist;
            particles.push({
              lx: lx, ly: ly,                              // unscaled — re-projected on resize
              tx: offX + lx * SCALE,
              ty: offY + ly * SCALE,
              sx: sx, sy: sy,                              // remembered spawn — used on reset
              x:  sx, y:  sy,
              color: COLORS[q],
              size: 1.2 + Math.random() * 1.1,
              // Stagger start times across 0–140ms so the first particles
              // begin moving immediately — no frozen "skip" at the start.
              startDelay: Math.random() * 140,
            });
          }
        }
        pushPs(targetsH, Math.PI);   // H streams in from the left
        pushPs(targetsM, 0);         // M streams in from the right

        var phase = 'assembling';
        var elapsed = 0;              // accumulated real animation time
        var lastFrameNow = null;      // for dt-based advancement
        var rafId = 0;

        var mo = new MutationObserver(function(){
          if (loader.classList.contains('loader-exit') && phase !== 'exiting') {
            phase = 'exiting';
          }
        });
        mo.observe(loader, { attributes: true, attributeFilter: ['class'] });

        function frame(/* scheduled-paint timestamp ignored on purpose */) {
          if (phase === 'exiting') return;

          // Don't advance while the page isn't actually being seen
          // (prerender, hidden tab).
          if (document.hidden || document.prerendering) {
            rafId = requestAnimationFrame(frame);
            return;
          }

          // Use real wall-clock execution time, NOT the rAF `now` parameter.
          // rAF passes the scheduled paint timestamp, so a burst of queued
          // rAFs that fire in rapid succession after a blocked main thread
          // will all report 16ms-apart `now` values and burn through the
          // animation. performance.now() reports the actual instant the
          // callback is running, which collapses to near-zero during a
          // burst — the dt cap then keeps the animation honest.
          var realNow = performance.now();
          if (lastFrameNow != null) {
            var dt = realNow - lastFrameNow;
            if (dt < 3) {                    // burst: barely any time passed
              lastFrameNow = realNow;
              rafId = requestAnimationFrame(frame);
              return;
            }
            if (dt > 50) dt = 33;            // cap unusually long gaps
            elapsed += dt;
          }
          lastFrameNow = realNow;

          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            if (elapsed > p.startDelay) {
              p.x += (p.tx - p.x) * LERP;
              p.y += (p.ty - p.y) * LERP;
              ctx.globalAlpha = Math.min(1, (elapsed - p.startDelay) / 110);
            } else {
              ctx.globalAlpha = 0.22;
            }
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          if (phase === 'assembling' && elapsed > ASSEMBLE_DUR) phase = 'settled';

          rafId = requestAnimationFrame(frame);
        }

        function drawStatic() {
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.arc(p.tx, p.ty, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function drawSpawnState() {
          // Synchronous draw of all particles at their spawn positions, so
          // whatever the very next paint commits, it shows the start of the
          // animation — never an advanced state from rAF bursts.
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.22;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        function startAnim() {
          // Reset state so prerender/bfcache restore starts a fresh run
          elapsed = 0;
          lastFrameNow = null;
          phase = 'assembling';
          for (var i = 0; i < particles.length; i++) {
            particles[i].x = particles[i].sx;
            particles[i].y = particles[i].sy;
          }
          if (rafId) cancelAnimationFrame(rafId);

          // Paint the spawn state synchronously. Whatever the browser
          // commits next is guaranteed to show the start of the animation,
          // never a half-converged state from rAF bursting.
          drawSpawnState();

          // Reset CSS animations on the loader by removing .go, forcing a
          // reflow, then re-adding .go on the next frame.
          loader.classList.remove('go');
          // eslint-disable-next-line no-unused-expressions
          void loader.offsetWidth;

          requestAnimationFrame(function(){
            requestAnimationFrame(function(){
              loader.classList.add('go');
              if (reduced) drawStatic();
              else rafId = requestAnimationFrame(frame);
            });
          });
        }

        // Defer until the page is actually being viewed, so a prerender or
        // hidden tab doesn't burn through the animation before the user sees it.
        function kickoffWhenVisible() {
          if (document.visibilityState === 'visible') {
            startAnim();
          } else {
            var onVis = function(){
              if (document.visibilityState !== 'visible') return;
              document.removeEventListener('visibilitychange', onVis);
              startAnim();
            };
            document.addEventListener('visibilitychange', onVis);
          }
        }

        // Show spawn state on the canvas immediately so the loader isn't
        // blank during the deferred kickoff below.
        drawSpawnState();

        // Defer the actual rAF loop until the page is fully loaded — this
        // way React's mount has finished and the main thread is idle when
        // the animation starts, so the browser paints every frame instead
        // of bursting through them while the page boots.
        var kicked = false;
        function kickoff() {
          if (kicked) return;
          if (document.prerendering) {
            document.addEventListener('prerenderingchange', kickoff, { once: true });
            return;
          }
          kicked = true;
          kickoffWhenVisible();
        }
        if (document.readyState === 'complete') {
          kickoff();
        } else {
          window.addEventListener('load', kickoff, { once: true });
          setTimeout(kickoff, 1500); // safety
        }

        // Re-run on back-forward cache restore (page was kept in memory;
        // scripts don't re-execute but pageshow fires with persisted=true).
        window.addEventListener('pageshow', function(e){
          if (e.persisted && loader.parentNode) {
            loader.classList.remove('loader-exit');
            kickoffWhenVisible();
          }
        });
      })();
    </script>

    <!-- GitHub Pages SPA: restore path from 404.html redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <div id="root"></div>
  </body>
